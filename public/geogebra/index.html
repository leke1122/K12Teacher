<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoGebra 3D Viewer</title>
  <style>
    * { box-sizing: border-box; }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    #ggb-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #ggb-container > div {
      width: 100% !important;
      height: 100% !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
    }

    #ggb-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
    }

    #ggb-container .applet_scaler {
      transform: none !important;
      width: 100% !important;
      height: 100% !important;
    }

    #ggb-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #6c757d;
      font-size: 16px;
      z-index: 10;
      pointer-events: none;
    }

    #ggb-loader .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e9ecef;
      border-top-color: #007bff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="ggb-loader">
    <div class="spinner"></div>
    <div>加载GeoGebra 3D引擎...</div>
  </div>
  <div id="ggb-container"></div>

  <script src="/geogebra/deployggb.js"></script>

  <script>
    var ggbApplet;
    var appletApp = null;
    var appletReady = false;
    var initAttempts = 0;
    var pendingInit = true;

    function getContainerSize() {
      var c = document.getElementById('ggb-container');
      if (!c) return { w: 0, h: 0 };
      var w = c.clientWidth;
      var h = c.clientHeight;
      return { w: w, h: h };
    }

    function forceResize() {
      try {
        var size = getContainerSize();
        if (size.w <= 0 || size.h <= 0) return;

        var container = document.getElementById('ggb-container');
        if (!container) return;

        var canvases = container.querySelectorAll('canvas');
        canvases.forEach(function(c) {
          c.style.width = '100%';
          c.style.height = '100%';
        });

        var appletScaler = container.querySelector('.applet_scaler');
        if (appletScaler) {
          appletScaler.style.width = size.w + 'px';
          appletScaler.style.height = size.h + 'px';
          appletScaler.style.transform = '';
        }

        if (appletApp) {
          if (typeof appletApp.resize === 'function') {
            appletApp.resize(size.w, size.h);
          }
          if (typeof appletApp.repaintViews === 'function') {
            appletApp.repaintViews();
          }
        }
      } catch(e) {}
    }

    var resizeObserver;

    function onAppletReady() {
      if (appletReady) return;
      appletReady = true;

      document.getElementById('ggb-loader')?.remove();

      // 暴露全局引用，parent 通过 iframe.contentWindow.ggbApplet 访问
      window.ggbApplet = ggbApplet;

      appletApp = ggbApplet.getAppletObject();
      if (appletApp) {
        window.ggbApp = appletApp;
      }

      // 禁用内置错误弹窗
      try { ggbApplet.setErrorDialogsActive(false); } catch(e) {}
      try { GGBApplet.setErrorDialogsActive(false); } catch(e) {}

      // 立即 + 延迟 2s 后都调用 forceResize
      forceResize();
      setTimeout(function() { forceResize(); }, 2000);
      setTimeout(function() {
        try {
          ggbApplet.evalCommand('SetViewDirection(Vector((0,0,1)))');
          ggbApplet.evalCommand('ZoomIn()');
        } catch(e) {}
      }, 1000);

      // 持续监听容器尺寸变化
      if (typeof ResizeObserver !== 'undefined') {
        resizeObserver = new ResizeObserver(function(entries) {
          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            var w = entry.contentRect.width;
            var h = entry.contentRect.height;
            if (w > 50 && h > 50) {
              forceResize();
              // 如果容器从很小变大了，重新初始化
              if (entry.target._lastW > 0 && entry.target._lastW < 100 && w > 200) {
                location.reload();
              }
              entry.target._lastW = w;
              entry.target._lastH = h;
            }
          }
        });
        resizeObserver.observe(document.getElementById('ggb-container') || document.body);
      }
    }

    function pollForAppletReady() {
      if (appletReady) return;
      if (typeof ggbApplet !== 'undefined' && ggbApplet !== null) {
        try {
          var testVal = ggbApplet.getVersion;
          if (typeof testVal === 'function') {
            onAppletReady();
            return;
          }
        } catch (e) {}
      }
      setTimeout(pollForAppletReady, 500);
    }

    function tryInit() {
      if (typeof GGBApplet === 'undefined') return;
      if (!pendingInit) return;

      var size = getContainerSize();

      // 等到容器有实际尺寸再初始化（最多等 20 次 × 250ms = 5s）
      if ((size.w <= 0 || size.h <= 0) && initAttempts < 20) {
        initAttempts++;
        setTimeout(tryInit, 250);
        return;
      }

      // 确认真的要初始化了
      pendingInit = false;

      try {
        // 使用实际尺寸，至少 400×300
        var w = Math.max(size.w, 400);
        var h = Math.max(size.h, 300);

        ggbApplet = new GGBApplet(
          {
            appName: '3D',
            width: w,
            height: h,
            showToolBar: true,
            showAlgebraInput: false,
            showMenuBar: false,
            allowStyleBar: true,
            borderColor: '#ffffff',
            enableFileFeatures: false,
            showResetIcon: true,
            enable3D: true,
            preventFocus: false,
            appletOnLoad: onAppletReady,
            showAlgebraWindow: false,
            showSpreadsheetView: false,
            showCASView: false,
            showProbabilityView: false,
            showPlotPanel: false,
            showAuxiliaryObjects: false,
          },
          true,
          { is3D: true, AV: false, SV: false, CV: false, EV2: false, CP: false, PC: false }
        );

        ggbApplet.setHTML5Codebase('/geogebra/web3d/');
        ggbApplet.inject('ggb-container');

        setTimeout(pollForAppletReady, 500);

      } catch (e) {
        console.error('[GeoGebra Loader] 创建 GGBApplet 失败: ' + (e.message || e));
      }
    }

    // 页面加载后等 DOM 稳定，再等 iframe 父级布局完成
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(tryInit, 300);
      });
    } else {
      setTimeout(tryInit, 300);
    }

    // 监听 window resize（窗口变化时重新初始化）
    window.addEventListener('resize', function() {
      if (appletReady) {
        forceResize();
      }
    });
  </script>
</body>
</html>
